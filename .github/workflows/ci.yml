# .github/workflows/ci.yml
# AIDEV-NOTE: Push/PR gate — test, vet, and gofmt. The module is fully vendored,
# so the build runs offline (-mod=vendor is implied by the committed vendor/).
# AIDEV-NOTE: Actions are pinned to commit SHAs (supply-chain hygiene); update the
# SHA and the trailing version comment together. dependabot keeps them current.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          # The project is vendored/offline by design; module caching adds nothing.
          cache: false

      - name: gofmt (must be clean)
        run: |
          set -euo pipefail
          # Exclude vendor/: third-party vendored deps are not all gofmt-clean,
          # and `go vet`/`go test ./...` already skip vendor in module mode.
          unformatted=$(gofmt -l . | grep -v '^vendor/' || true)
          if [ -n "${unformatted}" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "${unformatted}"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
